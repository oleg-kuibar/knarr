name: Feature Request
description: Suggest an improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What's missing or painful?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What else did you try or consider?
  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - CLI workflow
        - package manager support
        - bundler integration
        - documentation
        - performance
        - other
