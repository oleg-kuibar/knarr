name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and pack without publishing
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/knarr
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

      - name: Build example packages
        run: |
          cd examples/packages/api-client && npm ci && npx tsup
          cd ../ui-kit && npm ci && npx tsup

      - run: pnpm test
      - run: npm pack --dry-run

      - name: Publish
        if: inputs.dry_run == false
        # Trusted publishing uses OIDC; npm adds provenance automatically for
        # public packages published from public GitHub repositories.
        run: npm publish --access public
